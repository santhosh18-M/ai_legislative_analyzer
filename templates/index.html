<!DOCTYPE html>
<html>
<head>
    <title>AI Legislative Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">AI Legislative Analyzer</h2>

        <form id="uploadForm">
            <div class="mb-3">
                <label class="form-label">Upload PDF Document</label>
                <input type="file" class="form-control" id="fileInput" accept=".pdf" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Analyze</button>
        </form>

        <hr>

        <div id="result" style="display:none;">
            <h4>Results</h4>

            <p><b>Original Tokens:</b> <span id="orig"></span></p>
            <p><b>Compressed Tokens:</b> <span id="comp"></span></p>
            <p><b>Reduction (%):</b> <span id="reduction"></span></p>

            <h5>Summary</h5>
            <p id="summary"></p>

            <h5>Keywords</h5>
            <ul id="keywords"></ul>
        </div>

    </div>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("fileInput");

    if (fileInput.files.length === 0) {
        alert("Please upload a PDF file");
        return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("/upload_pdf", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        console.log(data);  

        document.getElementById("result").style.display = "block";

        document.getElementById("orig").innerText = data.original_tokens || "Error";
        document.getElementById("comp").innerText = data.compressed_tokens || "Error";
        document.getElementById("reduction").innerText = (data.token_reduction_percent || 0) + "%";
        document.getElementById("summary").innerText = data.summary || "No summary";

        const keywordsList = document.getElementById("keywords");
        keywordsList.innerHTML = "";
        (data.keywords || []).forEach(k => {
            let li = document.createElement("li");
            li.innerText = k;
            keywordsList.appendChild(li);
        });

    } catch (error) {
        console.error(error);
    }
});
</script>

</body>
</html>
